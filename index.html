<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
  color: white;
}

/* layout sin panel */
.panel {
  position: absolute;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 420px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.item {
  text-align: center;
  cursor: pointer;
  opacity: 0.9;
  transition: 0.2s;
  padding: 8px;
  border-radius: 12px;
}

.item:hover {
  transform: scale(1.05);
  opacity: 1;
  background: rgba(255,255,255,0.05);
}

.icon {
  width: 30px;
  height: 30px;
  display: block;
  margin: 0 auto 6px;
}

/* 🔘 indicador */
.dot {
  width: 8px;
  height: 8px;
  margin: 6px auto 0;
  border-radius: 50%;
  background: transparent;
  transition: 0.2s ease;
}

/* activo */
.dot.active {
  background: rgba(205, 227, 194, 1);
  box-shadow: 0 0 10px rgba(205, 227, 194, 0.8);
}
</style>
</head>

<body>

<div class="panel">

  <div class="item" onclick="toggleSound('coffee')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/cafe.png">
    <div class="dot"></div>
  </div>

  <div class="item" onclick="toggleSound('murmur')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/murmur.png">
    <div class="dot"></div>
  </div>

  <div class="item" onclick="toggleSound('fire')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/fire.png">
    <div class="dot"></div>
  </div>

  <div class="item" onclick="toggleSound('rain')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/rain.png">
    <div class="dot"></div>
  </div>

</div>

<script>

const sounds = {
  coffee: new Audio("CAFE.mp3"),
  murmur: new Audio("MURMUR.mp3"),
  fire: new Audio("FIRE.mp3"),
  rain: new Audio("RAIN.mp3")
};

for (let k in sounds) {
  sounds[k].loop = true;
  sounds[k].volume = 0;
}

/* 🔓 unlock */
let unlocked = false;
document.body.addEventListener("click", () => {
  if (unlocked) return;
  unlocked = true;

  for (let k in sounds) {
    sounds[k].play().then(() => {
      sounds[k].pause();
      sounds[k].currentTime = 0;
    }).catch(()=>{});
  }
}, { once: true });

/* 🌊 fade */
function fade(audio, target) {
  function step() {
    let diff = target - audio.volume;

    if (Math.abs(diff) < 0.01) {
      audio.volume = target;
      return;
    }

    audio.volume += diff * 0.08;
    requestAnimationFrame(step);
  }
  step();
}

/* 🎧 toggle + dot */
function toggleSound(name) {
  const s = sounds[name];
  const dot = document.querySelector(`[onclick="toggleSound('${name}')"] .dot`);

  if (s.paused) {
    s.play();
    fade(s, 0.6);
    if (dot) dot.classList.add("active");
  } else {
    fade(s, 0);
    setTimeout(() => s.pause(), 800);
    if (dot) dot.classList.remove("active");
  }
}

window.addEventListener("load", () => {
  for (let k in sounds) {

    // 💡 forzar apagado SIEMPRE
    sounds[k].volume = 0;
    sounds[k].pause();

    const item = document.querySelector(`[onclick="toggleSound('${k}')"]`);
    const dot = item ? item.querySelector(".dot") : null;

    if (dot) dot.classList.remove("active");

    // opcional: limpiar storage para evitar re-encendido futuro
    localStorage.removeItem("amb_" + k);
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
  color: white;
}

.panel {
  position: absolute;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 420px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;

}

.item {
  text-align: center;
  cursor: pointer;
  opacity: 0.85;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.05);
  opacity: 1;
}

.icon {
  width: 30px;
  height: 30px;
  display: block;
  margin: 0 auto 6px;
}

/* 🎚 SLIDER */
.slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: black;
  border-radius: 10px;
  outline: none;
  margin-top: 6px;
}

/* activo */
.slider.active {
  background: rgba(205, 227, 194, 0.6);
}

.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: black;
  border-radius: 50%;
  cursor: pointer;
  margin-top: -5px;
}

.slider.active::-webkit-slider-thumb {
  background: rgba(205, 227, 194, 1);
}

.slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: white;
  border: none;
  border-radius: 50%;
  cursor: pointer;
}

.slider.active::-moz-range-thumb {
  background: rgba(205, 227, 194, 1);
}
</style>
</head>

<body>

<div class="panel">

  <div class="item" onclick="toggleSound('coffee')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/cafe.png">
    Coffee
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('coffee', this.value)">
  </div>

  <div class="item" onclick="toggleSound('murmur')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/murmur.png">
    Murmur
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('murmur', this.value)">
  </div>

  <div class="item" onclick="toggleSound('fire')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/fire.png">
    Fire
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('fire', this.value)">
  </div>

  <div class="item" onclick="toggleSound('rain')">
    <img class="icon" src="https://raw.githubusercontent.com/xmqvn8t5xd-svg/ambience/main/rain.png">
    Rain
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('rain', this.value)">
  </div>

</div>

<script>

const sounds = {
  coffee: new Audio("CAFE.mp3"),
  murmur: new Audio("MURMUR.mp3"),
  fire: new Audio("FIRE.mp3"),
  rain: new Audio("RAIN.mp3")
};

for (let k in sounds) {
  sounds[k].loop = true;
  sounds[k].volume = 0;
}

/* 🔓 unlock audio (sin autoplay) */
let unlocked = false;
document.body.addEventListener("click", () => {
  if (unlocked) return;
  unlocked = true;

  for (let k in sounds) {
    sounds[k].play().then(() => {
      sounds[k].pause();
      sounds[k].currentTime = 0;
    }).catch(()=>{});
  }
}, { once: true });

/* 🌊 fade */
function fade(audio, target) {
  function step() {
    let diff = target - audio.volume;

    if (Math.abs(diff) < 0.01) {
      audio.volume = target;
      return;
    }

    audio.volume += diff * 0.08;
    requestAnimationFrame(step);
  }
  step();
}

/* 🎧 toggle */
function toggleSound(name) {
  const s = sounds[name];
  const slider = document.querySelector(`input[oninput*="${name}"]`);

  if (s.paused || s.volume === 0) {
    s.play();
    fade(s, 0.6);
    if (slider) slider.classList.add("active");
  } else {
    fade(s, 0);
    setTimeout(() => s.pause(), 800);
    if (slider) slider.classList.remove("active");
  }
}

/* 🎚 volumen */
function setVolume(name, value) {
  const s = sounds[name];
  const slider = document.querySelector(`input[oninput*="${name}"]`);
  value = parseFloat(value);

  if (value > 0) {
    if (s.paused) s.play();
    if (slider) slider.classList.add("active");
  } else {
    if (slider) slider.classList.remove("active");
  }

  s.volume = value;
  localStorage.setItem("amb_" + name, value);
}

/* 💾 restore state */
window.addEventListener("load", () => {
  for (let k in sounds) {
    const v = localStorage.getItem("amb_" + k);

    if (v !== null) {
      const val = parseFloat(v);
      sounds[k].volume = val;

      const slider = document.querySelector(`input[oninput*="${k}"]`);

      if (slider) slider.value = val;
    }
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
  color: white;
}

.panel {
  position: absolute;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 420px;
  padding: 18px;
  background: rgb(192,192,192);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.item {
  text-align: center;
  cursor: pointer;
  opacity: 0.85;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.05);
  opacity: 1;
}

.icon {
  width: 30px;
  height: 30px;
  display: block;
  margin: 0 auto 6px;
}

.slider {
  width: 100%;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="panel">

  <div class="item" onclick="toggleSound('coffee')">
    <img class="icon" src="https://golden-hour-roast.vercel.app/static/media/soundIcon%20(4).9a3e299f07c60addb4fa.png">
    Coffee
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('coffee', this.value)">
  </div>

  <div class="item" onclick="toggleSound('vinyl')">
    <img class="icon" src="https://golden-hour-roast.vercel.app/static/media/soundIcon%20(5).4d57f69ccfde00a07624.png">
    Vinyl
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('vinyl', this.value)">
  </div>

  <div class="item" onclick="toggleSound('fire')">
    <img class="icon" src="https://golden-hour-roast.vercel.app/static/media/soundIcon%20(1).196d1e2ebd1426d32945.png">
    Fire
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('fire', this.value)">
  </div>

  <div class="item" onclick="toggleSound('rain')">
    <img class="icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='white'%3E%3Cpath d='M20 50a12 12 0 1 1 2-23 14 14 0 0 1 26 5h2a10 10 0 0 1 0 20H20z'/%3E%3Cpath d='M22 52v6M30 52v6M38 52v6' stroke='white' stroke-width='2'/%3E%3C/svg%3E">
    Rain
    <input class="slider" type="range" min="0" max="1" step="0.01"
      oninput="setVolume('rain', this.value)">
  </div>

</div>

<script>

// 🎧 AUDIO ENGINE
const sounds = {
  coffee: new Audio("CAFE.mp3"),
  vinyl: new Audio("MURMUR.mp3"),
  fire: new Audio("FIRE.mp3"),
  rain: new Audio("RAIN.mp3")
};

// configuración inicial
for (let k in sounds) {
  sounds[k].loop = true;
  sounds[k].volume = 0;
}

// 🔓 desbloquear audio (necesario en navegadores)
let unlocked = false;
document.body.addEventListener("click", () => {
  if (unlocked) return;
  unlocked = true;

  for (let k in sounds) {
    sounds[k].play().then(() => {
      sounds[k].pause();
      sounds[k].currentTime = 0;
    }).catch(()=>{});
  }
}, { once: true });

// 🌊 fade suave
function fade(audio, target) {
  function step() {
    let diff = target - audio.volume;

    if (Math.abs(diff) < 0.01) {
      audio.volume = target;
      return;
    }

    audio.volume += diff * 0.08;
    requestAnimationFrame(step);
  }
  step();
}

// 🎧 activar/desactivar sonido
function toggleSound(name) {
  const s = sounds[name];

  if (s.paused || s.volume === 0) {
    s.play();
    fade(s, 0.6);
  } else {
    fade(s, 0);
    setTimeout(() => s.pause(), 800);
  }
}

// 🎚 control de volumen
function setVolume(name, value) {
  const s = sounds[name];
  value = parseFloat(value);

  if (value > 0 && s.paused) s.play();

  s.volume = value;

  localStorage.setItem("amb_" + name, value);
}

// 💾 restaurar estado
window.addEventListener("load", () => {
  for (let k in sounds) {
    const v = localStorage.getItem("amb_" + k);

    if (v !== null) {
      const val = parseFloat(v);
      sounds[k].volume = val;

      if (val > 0) sounds[k].play().catch(()=>{});
    }
  }
});

</script>

</body>
</html>
